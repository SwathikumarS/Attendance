<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Report | Attendance System</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Tailwind CSS for rapid admin dashboard styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        slate: {
                            850: '#151e2e',
                            900: '#0f172a',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Custom Scrollbar for the table */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body class="min-h-screen p-4 md:p-8 flex flex-col font-sans">

    <div class="max-w-7xl w-full mx-auto flex-1 flex flex-col gap-6">

        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1
                    class="text-3xl font-display font-bold bg-gradient-to-br from-white to-slate-400 bg-clip-text text-transparent">
                    Attendance Logs</h1>
                <p class="text-slate-400 text-sm mt-1">View and export employee tracking data.</p>
            </div>

            <div class="flex gap-3">
                <button id="btnRefresh"
                    class="flex items-center gap-2 px-4 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 transition-colors">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                    <span>Refresh</span>
                </button>
                <button id="btnExport"
                    class="flex items-center gap-2 px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-500 text-white font-medium transition-colors shadow-lg shadow-blue-900/20">
                    <i data-lucide="download" class="w-4 h-4"></i>
                    <span>Export CSV</span>
                </button>
            </div>
        </header>

        <!-- Filters / Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="glass-panel p-5 rounded-xl flex items-center gap-4">
                <div class="p-3 bg-blue-500/20 text-blue-400 rounded-lg"><i data-lucide="users"></i></div>
                <div>
                    <p class="text-sm text-slate-400 font-medium">Total Scans Today</p>
                    <p id="statToday" class="text-2xl font-display font-bold">0</p>
                </div>
            </div>
            <div class="glass-panel p-5 rounded-xl flex items-center gap-4">
                <div class="p-3 bg-emerald-500/20 text-emerald-400 rounded-lg"><i data-lucide="fingerprint"></i></div>
                <div>
                    <p class="text-sm text-slate-400 font-medium">Biometric Methods</p>
                    <p id="statBio" class="text-2xl font-display font-bold">0</p>
                </div>
            </div>
            <div class="glass-panel p-5 rounded-xl flex items-center gap-4">
                <div class="p-3 bg-purple-500/20 text-purple-400 rounded-lg"><i data-lucide="scan-face"></i></div>
                <div>
                    <p class="text-sm text-slate-400 font-medium">Face Scans</p>
                    <p id="statFace" class="text-2xl font-display font-bold">0</p>
                </div>
            </div>
        </div>

        <!-- Data Table -->
        <div class="glass-panel rounded-xl flex-1 flex flex-col overflow-hidden">
            <!-- Table Header/Search -->
            <div class="p-4 border-b border-slate-700/50 flex justify-between items-center bg-slate-800/30">
                <h2 class="font-semibold text-lg">Recent Records</h2>
                <div class="relative">
                    <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="searchInput" placeholder="Search Employee ID..."
                        class="bg-slate-900/50 border border-slate-700 rounded-lg pl-9 pr-4 py-2 text-sm focus:outline-none focus:border-blue-500 w-64 transition-colors">
                </div>
            </div>

            <!-- Table Content -->
            <div class="overflow-x-auto flex-1">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-800/50 text-slate-400 text-xs uppercase tracking-wider">
                            <th class="p-4 font-medium">Employee ID</th>
                            <th class="p-4 font-medium">Date & Time</th>
                            <th class="p-4 font-medium">Method</th>
                            <th class="p-4 font-medium">Location Data</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-700/50 text-sm">
                        <!-- Loading State -->
                        <tr>
                            <td colspan="4" class="p-8 text-center text-slate-500">
                                <i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto mb-2"></i>
                                Connecting to Database...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Table Footer / Pagination -->
            <div
                class="p-4 border-t border-slate-700/50 bg-slate-800/30 text-xs text-slate-400 flex justify-between items-center">
                <span id="recordCount">Showing 0 records</span>
                <div class="flex items-center gap-1 text-[10px] uppercase tracking-wide opacity-50">
                    <i data-lucide="shield-check" class="w-3 h-3"></i> Secure Admin View
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
