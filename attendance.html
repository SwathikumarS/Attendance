<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendance Control | Antigravity</title>

    <!-- PWA Requirements -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f310.png">

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Styles -->
    <style>
        /*
      Attendance PWA - Styles
      Hyper-premium design system: Glassmorphism, Animated Mesh Gradients, Inter/Outfit typography.
    */

        :root {
            --bg-color: #0f172a;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Mesh Gradient Background */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: -1;
            background: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
        }

        .sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 20s infinite ease-in-out alternate;
        }

        .sphere-1 {
            width: 400px;
            height: 400px;
            background: rgba(59, 130, 246, 0.3);
            top: -100px;
            left: -100px;
        }

        .sphere-2 {
            width: 300px;
            height: 300px;
            background: rgba(139, 92, 246, 0.3);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }

            100% {
                transform: translate(0, 0) scale(1);
            }
        }

        /* Container */
        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 2rem;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: relative;
            z-index: 10;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 1rem;
        }

        .header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #94a3b8);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Status Indicator */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--warning);
            box-shadow: 0 0 8px var(--warning);
        }

        .status-text {
            color: var(--text-primary);
        }

        .status-bar.valid .status-dot {
            background-color: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        .status-bar.invalid .status-dot {
            background-color: var(--error);
            box-shadow: 0 0 8px var(--error);
        }

        /* Buttons */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            padding: 1rem;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.5);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn.primary {
            background: var(--accent-color);
            border-color: var(--accent-hover);
        }

        .btn.primary:hover:not(:disabled) {
            background: var(--accent-hover);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        .btn i {
            font-size: 1.25rem;
        }

        /* Scanner Modal (Camera) */
        .modal {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 100;
            border-radius: 24px;
            flex-direction: column;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .scanner-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            border-radius: 24px 24px 0 0;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scanner-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
            z-index: 2;
        }

        .scanner-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
            animation: scan 2s infinite linear;
        }

        @keyframes scan {
            0% {
                top: 0;
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                top: 100%;
                opacity: 0;
            }
        }

        .modal-footer {
            padding: 1.5rem;
            background: var(--card-bg);
            text-align: center;
        }

        .close-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: var(--text-primary);
        }

        /* Messages */
        .message-box {
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            text-align: left;
            display: none;
            animation: slideUp 0.3s ease forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-box.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .message-box.success {
            display: block;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
        }

        /* Other Options list */
        .other-options {
            margin-top: 1rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--card-border);
        }

        .other-options h3 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .options-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .options-list li {
            font-size: 0.85rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .options-list li i {
            color: var(--accent-color);
            font-size: 1rem;
        }
    </style>
</head>

<body>

    <!-- Animated Background -->
    <div class="background">
        <div class="sphere sphere-1"></div>
        <div class="sphere sphere-2"></div>
    </div>

    <div class="app-container">
        <header class="header">
            <h1>Attendance</h1>
            <p>Secure Identity Protocol</p>
        </header>

        <!-- Employee Identification -->
        <div style="margin-bottom: 0.5rem;">
            <label for="employeeId"
                style="display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem;">Employee
                ID</label>
            <input type="text" id="employeeId" placeholder="E.g., EMP-101"
                style="width: 100%; padding: 0.8rem 1rem; border-radius: 12px; border: 1px solid var(--card-border); background: rgba(0,0,0,0.2); color: var(--text-primary); outline: none; transition: border-color 0.3s; font-size: 1rem;">
        </div>

        <!-- Geolocation Status -->
        <div id="geoStatus" class="status-bar">
            <div class="status-dot"></div>
            <span class="status-text">Verifying Location...</span>
        </div>

        <!-- Feedback Message -->
        <div id="messageBox" class="message-box" style="display: none;"></div>

        <!-- Primary Actions -->
        <div class="action-grid">
            <button id="btnBiometric" class="btn primary" disabled>
                <i data-lucide="fingerprint"></i>
                <span>Platform Biometrics</span>
            </button>

            <button id="btnFaceScan" class="btn" disabled>
                <i data-lucide="scan-face"></i>
                <span>Facial Recognition</span>
            </button>

            <button id="btnNFC" class="btn" disabled>
                <i data-lucide="nfc"></i>
                <span>Scan RFID/NFC Card</span>
            </button>
        </div>

        <!-- Alternative Options Info -->
        <div class="other-options">
            <h3>Other Valid Methods</h3>
            <ul class="options-list">
                <li><i data-lucide="qr-code"></i> Dynamic Office QR Code</li>
                <li><i data-lucide="wifi"></i> Corporate Wi-Fi Validation</li>
                <li><i data-lucide="bluetooth"></i> BLE Beacon Proximity</li>
            </ul>
        </div>
    </div>

    <!-- Face Scanner Modal -->
    <div id="scannerModal" class="modal">
        <div class="scanner-container">
            <video id="cameraFeed" autoplay playsinline></video>
            <div class="scanner-overlay">
                <div class="scanner-line"></div>
            </div>
        </div>
        <div class="modal-footer">
            <p id="scannerStatus" style="color: var(--text-primary); margin-bottom: 1rem;">Scanning facial features...
            </p>
            <button id="closeScannerBtn" class="close-btn">Cancel</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="attendance.js"></script>
    <script>
        lucide.createIcons();

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    }, err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</body>

</html>
